<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ギターコード検索ちゃん🎸</title>
    <script src="https://unpkg.com/vexchords/dist/vexchords.dev.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonaljs/tonal/browser/tonal.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .controls { margin-bottom: 30px; background: white; padding: 20px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { padding: 12px; width: 350px; font-size: 18px; border: 2px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 12px 25px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; }
        .usage-note { font-size: 12px; color: #666; margin-top: 10px; margin-bottom: 0; }
        #chord-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .chord-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); cursor: pointer; min-width: 180px; transition: transform 0.1s; border: 2px solid transparent; }
        .chord-card:hover { transform: scale(1.02); border-color: #007bff; }
        .chord-name { margin: 0 0 10px 0; font-size: 1.4em; color: #007bff; font-weight: bold; }
        svg text { font-weight: bold !important; font-size: 14px !important; transform: translateX(-6px); }
    </style>
</head>
<body>

    <h1>ギターコード検索ちゃん🎸</h1>
    <div class="controls">
        <input type="text" id="progression" placeholder="例: D Dsus4 G Gsus4" value="D Dsus4 G Gsus4">
        <button onclick="updateChords()">表示</button>
        <p class="usage-note">＊指板表をクリックすると、ハイポジションコードが数パターン表示できます。</p>
    </div>

    <div id="chord-container"></div>

    <script>
        let voicingState = {};

        // --- 1. 定番プリセット (sus4を最優先で定義) ---
        const PRESETS = {
            "C": [null, 3, 2, 0, 1, 0], "G": [3, 2, 0, 0, 0, 3], "A": [null, 0, 2, 2, 2, 0],
            "E": [0, 2, 2, 1, 0, 0], "D": [null, null, 0, 2, 3, 2], "Am": [null, 0, 2, 2, 1, 0],
            "Em": [0, 2, 2, 0, 0, 0], "F": [1, 3, 3, 2, 1, 1],
            "Csus4": [null, 3, 3, 0, 1, 1],
            "Dsus4": [null, null, 0, 2, 3, 3],
            "Esus4": [0, 2, 2, 2, 0, 0],
            "Asus4": [null, 0, 2, 2, 3, 0],
            "Gsus4": [3, 3, 0, 0, 3, 3],
            "Fsus4": [1, 3, 3, 3, 1, 1],
            "G/B": [null, 2, 0, 0, 3, 3], "D/F#": [2, null, 0, 2, 3, 2]
        };

        const SHAPES = {
            "E": { 
                "major": [0, 2, 2, 1, 0, 0], "minor": [0, 2, 2, 0, 0, 0], "7": [0, 2, 0, 1, 0, 0], 
                "maj7": [0, 2, 1, 1, 0, null], "m7": [0, 2, 0, 0, 0, 0], "sus4": [0, 2, 2, 2, 0, 0]
            },
            "A": { 
                "major": [null, 0, 2, 2, 2, 0], "minor": [null, 0, 2, 2, 1, 0], "7": [null, 0, 2, 0, 2, 0], 
                "maj7": [null, 0, 2, 1, 2, 0], "m7": [null, 0, 2, 0, 1, 0], "sus4": [null, 0, 2, 2, 3, 0]
            }
        };

        function getAllVoicings(chordName) {
            let voicings = [];
            
            // 1. プリセット確認（完全一致）
            if (PRESETS[chordName]) {
                voicings.push({ frets: PRESETS[chordName], minFret: -1 });
            }

            // 2. 分数コード判定
            if (chordName.includes("/")) {
                const [rootPart, bassPart] = chordName.split("/");
                if (PRESETS[rootPart]) {
                    const bassChroma = Tonal.Note.chroma(bassPart);
                    const stringBaseNotes = [4, 9, 2, 7, 11, 4];
                    [0, 1].forEach(sIdx => {
                        let offset = bassChroma - stringBaseNotes[sIdx];
                        while (offset < 0) offset += 12;
                        if (offset <= 12) {
                            let newFret = [...PRESETS[rootPart]];
                            newFret[sIdx] = offset;
                            voicings.push({ frets: newFret, minFret: offset });
                        }
                    });
                }
            }

            // 3. 自動計算 (Tonal.js使用)
            const chord = Tonal.Chord.get(chordName);
            if (!chord.empty) {
                // ここでsus4判定を強化
                let type = "major";
                const nameLower = chordName.toLowerCase();
                
                if (nameLower.includes("sus4") || nameLower.includes("suspended")) {
                    type = "sus4";
                } else if (nameLower.includes("m7") || chord.type.includes("minor seventh")) {
                    type = "m7";
                } else if (nameLower.includes("maj7") || chord.type.includes("major seventh")) {
                    type = "maj7";
                } else if (nameLower.includes("m") && !nameLower.includes("maj")) {
                    type = "minor";
                } else if (nameLower.includes("7")) {
                    type = "7";
                }

                const rootChroma = Tonal.Note.chroma(chord.tonic);
                const stringBaseNotes = [4, 9, 2, 7, 11, 4];
                
                ["A", "E"].forEach(style => {
                    const shape = SHAPES[style][type] || SHAPES[style]["major"];
                    const rIdx = (style === "E") ? 0 : 1;
                    let offset = rootChroma - stringBaseNotes[rIdx];
                    while (offset < 0) offset += 12;
                    const full = shape.map(f => f === null ? null : f + offset);
                    
                    // 重複チェック
                    if (!voicings.some(v => JSON.stringify(v.frets) === JSON.stringify(full))) {
                        const active = full.filter(f => f !== null && f > 0);
                        voicings.push({ frets: full, minFret: active.length > 0 ? Math.min(...active) : 0 });
                    }
                });
            }

            // 重複排除
            let unique = [];
            let seen = new Set();
            voicings.forEach(v => {
                let s = JSON.stringify(v.frets);
                if (!seen.has(s)) { unique.push(v); seen.add(s); }
            });

            // minFret順にソートして、クリックでハイポジションへ
            return unique.sort((a, b) => a.minFret - b.minFret).map(v => v.frets);
        }

        function drawChord(name, container) {
            if (!voicingState[name]) voicingState[name] = 0;
            const all = getAllVoicings(name);
            if (all.length === 0) {
                // 見つからない場合は名前だけ表示
                const card = document.createElement('div');
                card.className = 'chord-card';
                card.innerHTML = `<p class="chord-name">${name}</p><p style="font-size:12px; color:red;">Not Found</p>`;
                container.appendChild(card);
                return;
            };

            const frets = all[voicingState[name] % all.length];
            const active = frets.filter(f => f !== null && f > 0);
            const minF = active.length > 0 ? Math.min(...active) : 0;
            let baseF = minF > 2 ? minF : 0;

            const chordFormat = frets.map((f, i) => [6 - i, f === null ? 'x' : (f > 0 && baseF > 0 ? f - baseF + 1 : f)]);

            const card = document.createElement('div');
            card.className = 'chord-card';
            card.onclick = () => { 
                voicingState[name]++; 
                updateChords(); 
            };
            card.innerHTML = `<p class="chord-name">${name}</p>`;
            const diagram = document.createElement('div');
            new vexchords.ChordBox(diagram, { width: 160, height: 180, circleRadius: 4, numFrets: 5, strokeWidth: 2 }).draw({ chord: chordFormat, position: baseF });
            container.appendChild(card).appendChild(diagram);
        }

        function updateChords() {
            const input = document.getElementById('progression').value;
            const container = document.getElementById('chord-container');
            container.innerHTML = '';
            // カンマ、スペース、改行で区切ってループ
            const chords = input.trim().split(/[\s,]+/);
            chords.forEach(name => name && drawChord(name, container));
        }
        updateChords();
    </script>
</body>
</html>
